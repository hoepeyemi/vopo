services:
  - type: web
    name: vasmo-agent
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: WS_PORT
        value: 8080
      - key: MANTLE_RPC_URL
        value: https://rpc.sepolia.mantle.xyz
      - key: INVOICE_NFT_ADDRESS
        value: 0x76799a06A64f0b1C24Dd688348c6c2D2B215b173
      - key: YIELD_VAULT_ADDRESS
        value: 0xEfcae7a8c221956D1B3aff5bCDB0267e4aD6646A
      - key: AGENT_ROUTER_ADDRESS
        value: 0x38cf9B34d8Ca1d041FfB876Bf73f8DE2Cb119E01
      - key: PYTH_ORACLE_ADDRESS
        value: 0xD793Bb98C1B0b94E5392370d031ED76DeDeAcDd1
      - key: AGENT_PRIVATE_KEY
        sync: false  # Will be set via Render dashboard (sensitive)
      - key: QWEN_API_KEY
        sync: false  # Will be set via Render dashboard (sensitive)
